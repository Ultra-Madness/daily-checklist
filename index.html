<style>
  :root{
    --txt:#ffffff;
    --muted:rgba(255,255,255,.66);
    --faint:rgba(255,255,255,.42);
    --accent:#ECFF3D;            /* bright chartreuse-yellow */
    --accent-ink:#1c1e00;
    --done:#4cf0a8;              /* mint green for completed */
    --danger:#ff6b81;
    --glass:rgba(255,255,255,.10);
    --glass-2:rgba(255,255,255,.06);
    --brd:rgba(255,255,255,.22);
    --brd-soft:rgba(255,255,255,.12);
    --hi:rgba(255,255,255,.55);  /* inner top edge highlight */
    --shadow:0 20px 50px rgba(0,0,0,.42);
    --shadow-sm:0 8px 24px rgba(0,0,0,.30);
    --blur:22px;
    /* background palette (dark / aurora) */
    --b0:#07070e;
    --g1:rgba(255,45,110,.60); --g2:rgba(255,132,26,.50);
    --g3:rgba(45,120,255,.60); --g4:rgba(140,60,255,.52); --g5:rgba(22,209,201,.24);
  }
  html[data-theme="light"]{
    /* brighter, higher-key sunset palette; still vivid enough for white text */
    --b0:#1d0f33;
    --g1:rgba(255,86,158,.72); --g2:rgba(255,168,54,.62);
    --g3:rgba(78,150,255,.62); --g4:rgba(168,96,255,.60); --g5:rgba(64,235,220,.30);
    --glass:rgba(255,255,255,.16);
    --glass-2:rgba(255,255,255,.10);
    --brd:rgba(255,255,255,.34);
    --muted:rgba(255,255,255,.74);
    --shadow:0 20px 50px rgba(40,10,60,.40);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--txt);
    min-height:100vh;
    position:relative;
    overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
    background:var(--b0);
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  /* vivid abstract background */
  body::before{
    content:"";position:fixed;inset:-10% -10% -10% -10%;z-index:-2;
    background:
      radial-gradient(38% 50% at 16% 20%, var(--g1), transparent 60%),
      radial-gradient(42% 55% at 84% 14%, var(--g2), transparent 60%),
      radial-gradient(48% 58% at 82% 84%, var(--g3), transparent 62%),
      radial-gradient(46% 56% at 12% 86%, var(--g4), transparent 60%),
      radial-gradient(70% 80% at 50% 52%, var(--g5), transparent 72%),
      var(--b0);
    transition:background .4s ease, background-color .4s ease;
  }
  /* subtle grain for a frosted feel */
  body::after{
    content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;opacity:.05;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    mix-blend-mode:soft-light;
  }
  .wrap{max-width:520px;margin:0 auto;padding:24px 16px 60px;position:relative}

  /* glass surface helper */
  .glass{
    background:var(--glass);
    border:1px solid var(--brd);
    -webkit-backdrop-filter:blur(var(--blur)) saturate(150%);
    backdrop-filter:blur(var(--blur)) saturate(150%);
    box-shadow:var(--shadow), inset 0 1px 0 var(--hi);
  }

  header.app{display:flex;align-items:center;gap:13px;margin:4px 4px 20px}
  .logo{
    width:46px;height:46px;border-radius:14px;flex:0 0 auto;position:relative;
    background:linear-gradient(150deg, rgba(255,255,255,.28), rgba(255,255,255,.06));
    border:1px solid var(--brd);
    -webkit-backdrop-filter:blur(10px); backdrop-filter:blur(10px);
    display:grid;place-items:center;color:#fff;box-shadow:inset 0 1px 0 var(--hi),0 6px 18px rgba(0,0,0,.3);
  }
  .logo svg{width:25px;height:25px;filter:drop-shadow(0 1px 2px rgba(0,0,0,.35))}
  .titles h1{font-size:21px;line-height:1.05;margin:0;font-weight:800;letter-spacing:-.02em;
    text-shadow:0 2px 10px rgba(0,0,0,.25)}
  .titles .date{font-size:12.5px;color:var(--muted);margin-top:3px;font-weight:500}
  .spacer{flex:1}
  .iconbtn{
    width:42px;height:42px;border-radius:13px;color:var(--txt);cursor:pointer;display:grid;place-items:center;
    background:var(--glass);border:1px solid var(--brd);
    -webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);
    box-shadow:inset 0 1px 0 var(--hi);transition:transform .12s ease, background .2s ease;
  }
  .iconbtn:hover{transform:translateY(-1px);background:var(--glass-2)}
  .iconbtn:active{transform:translateY(0)}
  .iconbtn svg{width:20px;height:20px}

  .card{border-radius:24px}

  /* progress */
  .progress{padding:20px 20px 18px;margin-bottom:16px;border-radius:24px}
  .progress .row1{display:flex;align-items:baseline;justify-content:space-between;gap:10px}
  .progress .count{font-size:15px;font-weight:600;color:var(--muted)}
  .progress .count b{font-size:24px;font-weight:800;letter-spacing:-.02em;color:var(--txt)}
  .progress .pct{font-variant-numeric:tabular-nums;font-weight:900;font-size:24px;letter-spacing:-.02em;
    color:var(--accent);text-shadow:0 0 18px rgba(236,255,61,.35)}
  .bar{height:12px;border-radius:999px;background:rgba(255,255,255,.14);margin:14px 0 4px;overflow:hidden;
    border:1px solid var(--brd-soft)}
  .bar>i{display:block;height:100%;width:0%;border-radius:999px;
    background:linear-gradient(90deg,var(--accent),#7cf6ff);
    box-shadow:0 0 16px rgba(236,255,61,.45);transition:width .45s cubic-bezier(.2,.7,.2,1)}
  .subrow{display:flex;align-items:center;justify-content:space-between;margin-top:14px;gap:10px}
  .streaks{display:flex;gap:8px;flex-wrap:wrap}
  .chip{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;color:var(--muted);
    background:var(--glass-2);border:1px solid var(--brd-soft);padding:6px 11px;border-radius:999px;
    -webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px)}
  .chip b{color:var(--txt)}
  .chip.fire b{color:#ffd15c}
  .linkbtn{background:none;border:none;color:var(--muted);font-size:12.5px;cursor:pointer;padding:6px 4px;
    font-weight:600;text-decoration:underline;text-underline-offset:2px}
  .linkbtn:hover{color:var(--txt)}

  .celebrate{margin:0 0 16px;padding:15px 17px;border-radius:18px;display:none;align-items:center;gap:10px;
    background:linear-gradient(120deg, rgba(76,240,168,.22), rgba(124,246,255,.14));
    border:1px solid rgba(76,240,168,.45);color:#eafff4;font-weight:700;font-size:14px;
    -webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);box-shadow:inset 0 1px 0 var(--hi)}
  .celebrate.show{display:flex}

  /* list */
  ul.list{list-style:none;margin:0;padding:8px;border-radius:24px}
  li.task{display:flex;align-items:center;gap:13px;padding:13px 11px;border-radius:15px;transition:background .15s ease}
  li.task+li.task{border-top:1px solid var(--brd-soft)}
  li.task:hover{background:rgba(255,255,255,.06)}
  .check{
    width:27px;height:27px;flex:0 0 auto;border-radius:9px;cursor:pointer;display:grid;place-items:center;color:#06231a;
    background:rgba(255,255,255,.10);border:1.5px solid var(--brd);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.35);transition:all .16s ease;
  }
  .check svg{width:16px;height:16px;opacity:0;transform:scale(.5);transition:all .16s ease}
  li.task.done .check{background:linear-gradient(150deg,#7dffc4,var(--done));border-color:rgba(76,240,168,.8);
    box-shadow:0 0 16px rgba(76,240,168,.5), inset 0 1px 0 rgba(255,255,255,.5)}
  li.task.done .check svg{opacity:1;transform:scale(1)}
  .tasktext{flex:1;font-size:15.5px;line-height:1.35;cursor:pointer;word-break:break-word;padding:2px 0;
    text-shadow:0 1px 2px rgba(0,0,0,.18)}
  li.task.done .tasktext{color:var(--faint);text-decoration:line-through;text-decoration-thickness:2px}
  .rowbtn{opacity:0;border:none;background:none;color:var(--muted);cursor:pointer;width:31px;height:31px;
    border-radius:9px;display:grid;place-items:center;transition:opacity .15s ease,background .15s ease,color .15s ease}
  li.task:hover .rowbtn,li.task:focus-within .rowbtn{opacity:1}
  .rowbtn:hover{background:rgba(255,255,255,.10)}
  .rowbtn.del:hover{color:var(--danger)}
  .rowbtn svg{width:16px;height:16px}
  .edit-input{flex:1;font-size:15.5px;font-family:inherit;color:var(--txt);background:rgba(0,0,0,.18);
    border:1px solid var(--accent);border-radius:11px;padding:8px 11px;outline:none}

  .empty{padding:36px 20px;text-align:center;color:var(--muted)}
  .empty svg{width:42px;height:42px;opacity:.6;margin-bottom:8px}

  /* add */
  .addbar{display:flex;gap:10px;margin-top:16px}
  .addbar input{
    flex:1;font-size:15.5px;font-family:inherit;color:var(--txt);
    background:var(--glass);border:1px solid var(--brd);border-radius:16px;padding:15px 17px;outline:none;
    -webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);
    box-shadow:inset 0 1px 0 var(--hi);transition:border-color .15s ease}
  .addbar input::placeholder{color:var(--faint)}
  .addbar input:focus{border-color:var(--accent)}
  .addbtn{
    flex:0 0 auto;border:none;border-radius:16px;padding:0 20px;font-size:15px;font-weight:800;cursor:pointer;
    color:var(--accent-ink);background:linear-gradient(150deg,#f7ff7a,var(--accent));
    box-shadow:0 8px 22px rgba(236,255,61,.30), inset 0 1px 0 rgba(255,255,255,.5);
    display:inline-flex;align-items:center;gap:7px;transition:transform .12s ease,opacity .2s ease}
  .addbtn:hover{transform:translateY(-1px)}
  .addbtn:disabled{opacity:.4;cursor:default;transform:none;box-shadow:none}
  .addbtn svg{width:18px;height:18px}

  #installBtn{display:none;margin:20px auto 0;color:var(--txt);font-weight:700;font-size:13.5px;cursor:pointer;
    padding:12px 18px;border-radius:14px;align-items:center;gap:8px;
    background:var(--glass);border:1px solid var(--brd);
    -webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);box-shadow:inset 0 1px 0 var(--hi)}
  #installBtn.show{display:inline-flex}
  #installBtn:hover{background:var(--glass-2)}
  #installBtn svg{width:17px;height:17px;color:var(--accent)}

  footer.note{text-align:center;color:var(--faint);font-size:12px;margin-top:26px;line-height:1.6}

  .toast{position:fixed;left:50%;bottom:24px;transform:translate(-50%,20px);
    background:rgba(12,12,20,.72);color:#fff;padding:12px 20px;border-radius:14px;
    border:1px solid var(--brd);-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);
    font-size:13.5px;font-weight:600;box-shadow:var(--shadow);opacity:0;pointer-events:none;
    transition:all .25s ease;z-index:50}
  .toast.show{opacity:1;transform:translate(-50%,0)}
  @media (prefers-reduced-motion: reduce){*{transition:none !important}}
</style>
</head>
<body>
  <div class="wrap">
    <header class="app">
      <div class="logo" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
      </div>
      <div class="titles">
        <h1>Daily Checklist</h1>
        <div class="date" id="dateLabel"></div>
      </div>
      <div class="spacer"></div>
      <button class="iconbtn" id="themeBtn" title="Toggle theme" aria-label="Toggle background mood"></button>
    </header>

    <section class="card progress glass" aria-label="Today's progress">
      <div class="row1">
        <div class="count"><b id="doneCount">0</b> of <span id="totalCount">0</span> done</div>
        <div class="pct" id="pctLabel">0%</div>
      </div>
      <div class="bar"><i id="barFill"></i></div>
      <div class="subrow">
        <div class="streaks">
          <span class="chip fire" title="Days in a row you finished everything">🔥 <b id="streakCur">0</b>&nbsp;day streak</span>
          <span class="chip" title="Your best streak so far">🏆 Best <b id="streakBest">0</b></span>
        </div>
        <button class="linkbtn" id="uncheckBtn" style="display:none">Uncheck all</button>
      </div>
    </section>

    <div class="celebrate" id="celebrate">🎉 All done for today — nice work!</div>

    <section class="card glass">
      <ul class="list" id="list"></ul>
      <div class="empty" id="empty" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        <div>No tasks yet. Add your first one below.</div>
      </div>
    </section>

    <form class="addbar" id="addForm" autocomplete="off">
      <input id="addInput" type="text" placeholder="Add a task…" maxlength="120" aria-label="Add a new task" />
      <button class="addbtn" id="addBtn" type="submit" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
        Add
      </button>
    </form>

    <button id="installBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12M7 10l5 5 5-5"/><path d="M5 21h14"/></svg>
      Install this app
    </button>

    <footer class="note">
      Your checklist resets each morning. Everything is saved on this device only.
    </footer>
  </div>

  <div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";
  var LS = { tasks:"dc.tasks", state:"dc.state", streak:"dc.streak", theme:"dc.theme" };
  var DEFAULT_TASKS = [
    "Drink a glass of water",
    "Make the bed",
    "Move for 10 minutes",
    "Plan today's top 3 priorities",
    "Tidy up for 5 minutes",
    "Wind down screens before bed"
  ];

  // ---------- helpers ----------
  function read(key, fallback){
    try { var v = localStorage.getItem(key); return v==null ? fallback : JSON.parse(v); }
    catch(e){ return fallback; }
  }
  function write(key, val){ try { localStorage.setItem(key, JSON.stringify(val)); } catch(e){} }
  function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
  function pad(n){ return n<10 ? "0"+n : ""+n; }
  function dstr(d){ return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }
  function today(){ return dstr(new Date()); }
  function yesterday(){ var d=new Date(); d.setDate(d.getDate()-1); return dstr(d); }

  // ---------- state ----------
  var tasks = read(LS.tasks, null);
  if (!Array.isArray(tasks)) { tasks = DEFAULT_TASKS.map(function(t){ return {id:uid(), text:t}; }); write(LS.tasks, tasks); }

  var state = read(LS.state, null);
  if (!state || typeof state!=="object") state = { date: today(), checked:{} };

  var streak = read(LS.streak, null);
  if (!streak || typeof streak!=="object") streak = { current:0, best:0, lastDate:null };

  // ---------- daily reset ----------
  function dailyReset(){
    if (state.date !== today()){
      state.date = today();
      state.checked = {};
      write(LS.state, state);
    }
    // break streak if the last completed day is older than yesterday
    if (streak.lastDate !== today() && streak.lastDate !== yesterday()){
      if (streak.current !== 0){ streak.current = 0; write(LS.streak, streak); }
    }
  }

  // ---------- derived ----------
  function doneCount(){ var n=0; tasks.forEach(function(t){ if(state.checked[t.id]) n++; }); return n; }
  function allDone(){ return tasks.length>0 && doneCount()===tasks.length; }
  function displayStreak(){
    return (streak.lastDate===today() || streak.lastDate===yesterday()) ? streak.current : 0;
  }

  function markCompleteIfNeeded(){
    if (allDone() && streak.lastDate !== today()){
      streak.current = (streak.lastDate === yesterday()) ? (streak.current + 1) : 1;
      streak.lastDate = today();
      if (streak.current > streak.best) streak.best = streak.current;
      write(LS.streak, streak);
      showToast("🔥 " + streak.current + " day streak!");
    }
  }

  // ---------- rendering ----------
  var $ = function(id){ return document.getElementById(id); };
  var listEl=$("list"), emptyEl=$("empty");

  var icons = {
    check:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>',
    edit:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>',
    del:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>'
  };

  function render(){
    // progress
    var total = tasks.length, done = doneCount();
    var pct = total ? Math.round(done/total*100) : 0;
    $("doneCount").textContent = done;
    $("totalCount").textContent = total;
    $("pctLabel").textContent = pct + "%";
    $("barFill").style.width = pct + "%";
    $("streakCur").textContent = displayStreak();
    $("streakBest").textContent = streak.best;
    $("celebrate").classList.toggle("show", allDone());
    $("uncheckBtn").style.display = done>0 ? "" : "none";

    // list
    listEl.innerHTML = "";
    tasks.forEach(function(t){
      var checked = !!state.checked[t.id];
      var li = document.createElement("li");
      li.className = "task" + (checked ? " done" : "");
      li.dataset.id = t.id;

      var box = document.createElement("button");
      box.className = "check"; box.type="button";
      box.setAttribute("role","checkbox");
      box.setAttribute("aria-checked", checked ? "true":"false");
      box.setAttribute("aria-label", (checked?"Uncheck ":"Check ")+t.text);
      box.innerHTML = icons.check;
      box.addEventListener("click", function(e){ e.stopPropagation(); toggle(t.id); });

      var span = document.createElement("div");
      span.className="tasktext"; span.textContent = t.text;
      span.addEventListener("click", function(){ toggle(t.id); });

      var editBtn = document.createElement("button");
      editBtn.className="rowbtn"; editBtn.type="button"; editBtn.title="Edit"; editBtn.setAttribute("aria-label","Edit task");
      editBtn.innerHTML = icons.edit;
      editBtn.addEventListener("click", function(e){ e.stopPropagation(); startEdit(li, t); });

      var delBtn = document.createElement("button");
      delBtn.className="rowbtn del"; delBtn.type="button"; delBtn.title="Delete"; delBtn.setAttribute("aria-label","Delete task");
      delBtn.innerHTML = icons.del;
      delBtn.addEventListener("click", function(e){ e.stopPropagation(); removeTask(t.id); });

      li.appendChild(box); li.appendChild(span); li.appendChild(editBtn); li.appendChild(delBtn);
      listEl.appendChild(li);
    });
    emptyEl.style.display = tasks.length ? "none" : "block";
  }

  // ---------- actions ----------
  function toggle(id){
    state.checked[id] = !state.checked[id];
    if(!state.checked[id]) delete state.checked[id];
    write(LS.state, state);
    markCompleteIfNeeded();
    render();
  }
  function addTask(text){
    text = (text||"").trim(); if(!text) return;
    tasks.push({ id:uid(), text:text });
    write(LS.tasks, tasks);
    render();
  }
  function removeTask(id){
    tasks = tasks.filter(function(t){ return t.id!==id; });
    delete state.checked[id];
    write(LS.tasks, tasks); write(LS.state, state);
    render();
  }
  function startEdit(li, t){
    li.innerHTML = "";
    var input = document.createElement("input");
    input.className="edit-input"; input.value=t.text; input.maxLength=120;
    li.appendChild(input); input.focus(); input.select();
    function commit(){
      var v = input.value.trim();
      if(v){ t.text=v; write(LS.tasks,tasks); }
      render();
    }
    input.addEventListener("keydown", function(e){
      if(e.key==="Enter"){ e.preventDefault(); commit(); }
      else if(e.key==="Escape"){ render(); }
    });
    input.addEventListener("blur", commit);
  }

  // ---------- events ----------
  var addInput=$("addInput"), addBtn=$("addBtn");
  addInput.addEventListener("input", function(){ addBtn.disabled = !addInput.value.trim(); });
  $("addForm").addEventListener("submit", function(e){
    e.preventDefault(); addTask(addInput.value); addInput.value=""; addBtn.disabled=true; addInput.focus();
  });
  $("uncheckBtn").addEventListener("click", function(){
    state.checked = {}; write(LS.state, state); render();
  });

  // ---------- theme ----------
  var sunSvg='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>';
  var moonSvg='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></svg>';
  var themeBtn=$("themeBtn"), meta=$("themeColorMeta");
  function applyTheme(mode){
    document.documentElement.setAttribute("data-theme", mode);
    themeBtn.innerHTML = mode==="dark" ? sunSvg : moonSvg;
    meta.setAttribute("content", mode==="dark" ? "#0a0a12" : "#1d0f33");
    write(LS.theme, mode);
  }
  var savedTheme = read(LS.theme, null);
  if(savedTheme!=="light" && savedTheme!=="dark"){
    savedTheme = "dark";
  }
  applyTheme(savedTheme);
  themeBtn.addEventListener("click", function(){
    applyTheme(document.documentElement.getAttribute("data-theme")==="dark" ? "light":"dark");
  });

  // ---------- date label ----------
  $("dateLabel").textContent = new Date().toLocaleDateString(undefined,{weekday:"long", month:"long", day:"numeric"});

  // ---------- toast ----------
  var toastEl=$("toast"), toastTimer;
  function showToast(msg){
    toastEl.textContent=msg; toastEl.classList.add("show");
    clearTimeout(toastTimer); toastTimer=setTimeout(function(){ toastEl.classList.remove("show"); }, 2200);
  }

  // ---------- new-day watcher (if left open past midnight) ----------
  setInterval(function(){
    if(state.date !== today()){ dailyReset(); render(); }
  }, 60*1000);

  // ---------- install prompt ----------
  var deferredPrompt=null, installBtn=$("installBtn");
  window.addEventListener("beforeinstallprompt", function(e){
    e.preventDefault(); deferredPrompt=e; installBtn.classList.add("show");
  });
  installBtn.addEventListener("click", function(){
    if(!deferredPrompt) return;
    deferredPrompt.prompt();
    deferredPrompt.userChoice.finally(function(){ deferredPrompt=null; installBtn.classList.remove("show"); });
  });
  window.addEventListener("appinstalled", function(){ installBtn.classList.remove("show"); showToast("Installed \u2014 find it on your home screen"); });
  if(window.matchMedia && window.matchMedia("(display-mode: standalone)").matches){ installBtn.classList.remove("show"); }

  // ---------- boot ----------
  dailyReset();
  render();

  // ---------- service worker ----------
  if("serviceWorker" in navigator){
    window.addEventListener("load", function(){
      navigator.serviceWorker.register("./sw.js").catch(function(){});
    });
  }
})();
</script>
</body>
