<style>
  :root{
    --bg:#f4f5fb; --bg2:#eceeffe0; --card:#ffffff; --text:#1b1f2a; --muted:#6b7280;
    --line:#e7e8f0; --accent:#4f46e5; --accent2:#7c3aed; --accent-soft:#eef0ff;
    --done:#16a34a; --done-soft:#e9f8ee; --danger:#e11d48; --shadow:0 10px 30px rgba(31,35,80,.08);
    --shadow-sm:0 2px 8px rgba(31,35,80,.06);
  }
  html[data-theme="dark"]{
    --bg:#0e1017; --bg2:#141826; --card:#171a24; --text:#e8eaf2; --muted:#9aa0b3;
    --line:#262a38; --accent:#8b8bff; --accent2:#b388ff; --accent-soft:#20233a;
    --done:#34d399; --done-soft:#132a22; --danger:#fb7185; --shadow:0 12px 34px rgba(0,0,0,.4);
    --shadow-sm:0 2px 10px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:
      radial-gradient(1100px 480px at 50% -160px, var(--bg2), transparent 70%),
      var(--bg);
    color:var(--text);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    transition:background .25s ease,color .25s ease;
  }
  .wrap{max-width:560px;margin:0 auto;padding:22px 18px 60px}

  header.app{display:flex;align-items:center;gap:12px;margin:6px 2px 18px}
  .logo{
    width:44px;height:44px;border-radius:13px;flex:0 0 auto;
    background:linear-gradient(160deg,var(--accent),var(--accent2));
    display:grid;place-items:center;box-shadow:var(--shadow-sm);color:#fff;
  }
  .logo svg{width:24px;height:24px}
  .titles h1{font-size:20px;line-height:1.1;margin:0;font-weight:750;letter-spacing:-.02em}
  .titles .date{font-size:13px;color:var(--muted);margin-top:3px}
  .spacer{flex:1}
  .iconbtn{
    width:40px;height:40px;border-radius:11px;border:1px solid var(--line);
    background:var(--card);color:var(--text);cursor:pointer;display:grid;place-items:center;
    box-shadow:var(--shadow-sm);transition:transform .12s ease,border-color .2s ease;
  }
  .iconbtn:hover{transform:translateY(-1px)}
  .iconbtn:active{transform:translateY(0)}
  .iconbtn svg{width:19px;height:19px}

  .card{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow)}

  /* progress */
  .progress{padding:18px 18px 16px;margin-bottom:16px}
  .progress .row1{display:flex;align-items:baseline;justify-content:space-between;gap:10px}
  .progress .count{font-size:15px;font-weight:600}
  .progress .count b{font-size:22px;font-weight:800;letter-spacing:-.02em}
  .progress .pct{font-variant-numeric:tabular-nums;font-weight:800;font-size:22px;letter-spacing:-.02em}
  .bar{height:12px;border-radius:999px;background:var(--accent-soft);margin:12px 0 4px;overflow:hidden}
  .bar>i{display:block;height:100%;width:0%;border-radius:999px;
    background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .45s cubic-bezier(.2,.7,.2,1)}
  .subrow{display:flex;align-items:center;justify-content:space-between;margin-top:12px;gap:10px}
  .streaks{display:flex;gap:8px;flex-wrap:wrap}
  .chip{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;color:var(--muted);
    background:var(--bg);border:1px solid var(--line);padding:6px 10px;border-radius:999px}
  .chip b{color:var(--text)}
  .chip.fire b{color:#f97316}
  .linkbtn{background:none;border:none;color:var(--muted);font-size:12.5px;cursor:pointer;padding:6px 4px;
    font-weight:600;text-decoration:underline;text-underline-offset:2px}
  .linkbtn:hover{color:var(--text)}

  .celebrate{margin:0 0 16px;padding:14px 16px;border-radius:16px;display:none;align-items:center;gap:10px;
    background:var(--done-soft);border:1px solid color-mix(in srgb,var(--done) 30%,transparent);color:var(--done);font-weight:650;font-size:14px}
  .celebrate.show{display:flex}

  /* list */
  ul.list{list-style:none;margin:0;padding:6px;}
  li.task{display:flex;align-items:center;gap:12px;padding:12px 10px;border-radius:13px;transition:background .15s ease}
  li.task+li.task{border-top:1px solid var(--line)}
  li.task:hover{background:var(--bg)}
  .check{
    width:26px;height:26px;flex:0 0 auto;border-radius:8px;border:2px solid var(--line);
    background:var(--card);cursor:pointer;display:grid;place-items:center;transition:all .15s ease;color:#fff
  }
  .check svg{width:16px;height:16px;opacity:0;transform:scale(.5);transition:all .15s ease}
  li.task.done .check{background:var(--done);border-color:var(--done)}
  li.task.done .check svg{opacity:1;transform:scale(1)}
  .tasktext{flex:1;font-size:15.5px;line-height:1.35;cursor:pointer;word-break:break-word;padding:2px 0}
  li.task.done .tasktext{color:var(--muted);text-decoration:line-through;text-decoration-thickness:2px}
  .rowbtn{opacity:0;border:none;background:none;color:var(--muted);cursor:pointer;width:30px;height:30px;
    border-radius:8px;display:grid;place-items:center;transition:opacity .15s ease,background .15s ease,color .15s ease}
  li.task:hover .rowbtn,li.task:focus-within .rowbtn{opacity:1}
  .rowbtn:hover{background:var(--bg2)}
  .rowbtn.del:hover{color:var(--danger)}
  .rowbtn svg{width:16px;height:16px}
  .edit-input{flex:1;font-size:15.5px;font-family:inherit;color:var(--text);background:var(--bg);
    border:1px solid var(--accent);border-radius:9px;padding:7px 10px;outline:none}

  .empty{padding:34px 20px;text-align:center;color:var(--muted)}
  .empty svg{width:40px;height:40px;opacity:.5;margin-bottom:8px}

  /* add */
  .addbar{display:flex;gap:10px;margin-top:16px}
  .addbar input{
    flex:1;font-size:15.5px;font-family:inherit;color:var(--text);background:var(--card);
    border:1px solid var(--line);border-radius:14px;padding:14px 16px;outline:none;box-shadow:var(--shadow-sm);
    transition:border-color .15s ease
  }
  .addbar input:focus{border-color:var(--accent)}
  .addbtn{
    flex:0 0 auto;border:none;border-radius:14px;padding:0 18px;font-size:15px;font-weight:700;cursor:pointer;color:#fff;
    background:linear-gradient(160deg,var(--accent),var(--accent2));box-shadow:var(--shadow-sm);
    display:inline-flex;align-items:center;gap:7px;transition:transform .12s ease,opacity .2s ease
  }
  .addbtn:hover{transform:translateY(-1px)}
  .addbtn:disabled{opacity:.45;cursor:default;transform:none}
  .addbtn svg{width:17px;height:17px}

  #installBtn{display:none;margin:18px auto 0;border:1px dashed color-mix(in srgb,var(--accent) 45%,transparent);
    background:var(--accent-soft);color:var(--accent);font-weight:700;font-size:13.5px;cursor:pointer;
    padding:11px 16px;border-radius:13px;align-items:center;gap:8px}
  #installBtn.show{display:inline-flex}
  #installBtn svg{width:17px;height:17px}

  footer.note{text-align:center;color:var(--muted);font-size:12px;margin-top:26px;line-height:1.6}

  .toast{position:fixed;left:50%;bottom:24px;transform:translate(-50%,20px);background:var(--text);color:var(--card);padding:11px 18px;border-radius:12px;
    font-size:13.5px;font-weight:600;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:all .25s ease;z-index:50}
  .toast.show{opacity:1;transform:translate(-50%,0)}
  @media (prefers-reduced-motion: reduce){*{transition:none !important}}
</style>
</head>
<body>
  <div class="wrap">
    <header class="app">
      <div class="logo" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
      </div>
      <div class="titles">
        <h1>Daily Checklist</h1>
        <div class="date" id="dateLabel"></div>
      </div>
      <div class="spacer"></div>
      <button class="iconbtn" id="themeBtn" title="Toggle theme" aria-label="Toggle light or dark theme"></button>
    </header>

    <section class="card progress" aria-label="Today's progress">
      <div class="row1">
        <div class="count"><b id="doneCount">0</b> of <span id="totalCount">0</span> done</div>
        <div class="pct" id="pctLabel">0%</div>
      </div>
      <div class="bar"><i id="barFill"></i></div>
      <div class="subrow">
        <div class="streaks">
          <span class="chip fire" title="Days in a row you finished everything">🔥 <b id="streakCur">0</b>&nbsp;day streak</span>
          <span class="chip" title="Your best streak so far">🏆 Best <b id="streakBest">0</b></span>
        </div>
        <button class="linkbtn" id="uncheckBtn" style="display:none">Uncheck all</button>
      </div>
    </section>

    <div class="celebrate" id="celebrate">🎉 All done for today — nice work!</div>

    <section class="card">
      <ul class="list" id="list"></ul>
      <div class="empty" id="empty" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        <div>No tasks yet. Add your first one below.</div>
      </div>
    </section>

    <form class="addbar" id="addForm" autocomplete="off">
      <input id="addInput" type="text" placeholder="Add a task…" maxlength="120" aria-label="Add a new task" />
      <button class="addbtn" id="addBtn" type="submit" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
        Add
      </button>
    </form>

    <button id="installBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12M7 10l5 5 5-5"/><path d="M5 21h14"/></svg>
      Install this app
    </button>

    <footer class="note">
      Your checklist resets each morning. Everything is saved on this device only.
    </footer>
  </div>

  <div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";
  var LS = { tasks:"dc.tasks", state:"dc.state", streak:"dc.streak", theme:"dc.theme" };
  var DEFAULT_TASKS = [
    "Drink a glass of water",
    "Make the bed",
    "Move for 10 minutes",
    "Plan today's top 3 priorities",
    "Tidy up for 5 minutes",
    "Wind down screens before bed"
  ];

  // ---------- helpers ----------
  function read(key, fallback){
    try { var v = localStorage.getItem(key); return v==null ? fallback : JSON.parse(v); }
    catch(e){ return fallback; }
  }
  function write(key, val){ try { localStorage.setItem(key, JSON.stringify(val)); } catch(e){} }
  function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
  function pad(n){ return n<10 ? "0"+n : ""+n; }
  function dstr(d){ return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }
  function today(){ return dstr(new Date()); }
  function yesterday(){ var d=new Date(); d.setDate(d.getDate()-1); return dstr(d); }

  // ---------- state ----------
  var tasks = read(LS.tasks, null);
  if (!Array.isArray(tasks)) { tasks = DEFAULT_TASKS.map(function(t){ return {id:uid(), text:t}; }); write(LS.tasks, tasks); }

  var state = read(LS.state, null);
  if (!state || typeof state!=="object") state = { date: today(), checked:{} };

  var streak = read(LS.streak, null);
  if (!streak || typeof streak!=="object") streak = { current:0, best:0, lastDate:null };

  // ---------- daily reset ----------
  function dailyReset(){
    if (state.date !== today()){
      state.date = today();
      state.checked = {};
      write(LS.state, state);
    }
    // break streak if the last completed day is older than yesterday
    if (streak.lastDate !== today() && streak.lastDate !== yesterday()){
      if (streak.current !== 0){ streak.current = 0; write(LS.streak, streak); }
    }
  }

  // ---------- derived ----------
  function doneCount(){ var n=0; tasks.forEach(function(t){ if(state.checked[t.id]) n++; }); return n; }
  function allDone(){ return tasks.length>0 && doneCount()===tasks.length; }
  function displayStreak(){
    return (streak.lastDate===today() || streak.lastDate===yesterday()) ? streak.current : 0;
  }

  function markCompleteIfNeeded(){
    if (allDone() && streak.lastDate !== today()){
      streak.current = (streak.lastDate === yesterday()) ? (streak.current + 1) : 1;
      streak.lastDate = today();
      if (streak.current > streak.best) streak.best = streak.current;
      write(LS.streak, streak);
      showToast("🔥 " + streak.current + " day streak!");
    }
  }

  // ---------- rendering ----------
  var $ = function(id){ return document.getElementById(id); };
  var listEl=$("list"), emptyEl=$("empty");

  var icons = {
    check:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>',
    edit:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>',
    del:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>'
  };

  function render(){
    // progress
    var total = tasks.length, done = doneCount();
    var pct = total ? Math.round(done/total*100) : 0;
    $("doneCount").textContent = done;
    $("totalCount").textContent = total;
    $("pctLabel").textContent = pct + "%";
    $("barFill").style.width = pct + "%";
    $("streakCur").textContent = displayStreak();
    $("streakBest").textContent = streak.best;
    $("celebrate").classList.toggle("show", allDone());
    $("uncheckBtn").style.display = done>0 ? "" : "none";

    // list
    listEl.innerHTML = "";
    tasks.forEach(function(t){
      var checked = !!state.checked[t.id];
      var li = document.createElement("li");
      li.className = "task" + (checked ? " done" : "");
      li.dataset.id = t.id;

      var box = document.createElement("button");
      box.className = "check"; box.type="button";
      box.setAttribute("role","checkbox");
      box.setAttribute("aria-checked", checked ? "true":"false");
      box.setAttribute("aria-label", (checked?"Uncheck ":"Check ")+t.text);
      box.innerHTML = icons.check;
      box.addEventListener("click", function(e){ e.stopPropagation(); toggle(t.id); });

      var span = document.createElement("div");
      span.className="tasktext"; span.textContent = t.text;
      span.addEventListener("click", function(){ toggle(t.id); });

      var editBtn = document.createElement("button");
      editBtn.className="rowbtn"; editBtn.type="button"; editBtn.title="Edit"; editBtn.setAttribute("aria-label","Edit task");
      editBtn.innerHTML = icons.edit;
      editBtn.addEventListener("click", function(e){ e.stopPropagation(); startEdit(li, t); });

      var delBtn = document.createElement("button");
      delBtn.className="rowbtn del"; delBtn.type="button"; delBtn.title="Delete"; delBtn.setAttribute("aria-label","Delete task");
      delBtn.innerHTML = icons.del;
      delBtn.addEventListener("click", function(e){ e.stopPropagation(); removeTask(t.id); });

      li.appendChild(box); li.appendChild(span); li.appendChild(editBtn); li.appendChild(delBtn);
      listEl.appendChild(li);
    });
    emptyEl.style.display = tasks.length ? "none" : "block";
  }

  // ---------- actions ----------
  function toggle(id){
    state.checked[id] = !state.checked[id];
    if(!state.checked[id]) delete state.checked[id];
    write(LS.state, state);
    markCompleteIfNeeded();
    render();
  }
  function addTask(text){
    text = (text||"").trim(); if(!text) return;
    tasks.push({ id:uid(), text:text });
    write(LS.tasks, tasks);
    render();
  }
  function removeTask(id){
    tasks = tasks.filter(function(t){ return t.id!==id; });
    delete state.checked[id];
    write(LS.tasks, tasks); write(LS.state, state);
    render();
  }
  function startEdit(li, t){
    li.innerHTML = "";
    var input = document.createElement("input");
    input.className="edit-input"; input.value=t.text; input.maxLength=120;
    li.appendChild(input); input.focus(); input.select();
    function commit(){
      var v = input.value.trim();
      if(v){ t.text=v; write(LS.tasks,tasks); }
      render();
    }
    input.addEventListener("keydown", function(e){
      if(e.key==="Enter"){ e.preventDefault(); commit(); }
      else if(e.key==="Escape"){ render(); }
    });
    input.addEventListener("blur", commit);
  }

  // ---------- events ----------
  var addInput=$("addInput"), addBtn=$("addBtn");
  addInput.addEventListener("input", function(){ addBtn.disabled = !addInput.value.trim(); });
  $("addForm").addEventListener("submit", function(e){
    e.preventDefault(); addTask(addInput.value); addInput.value=""; addBtn.disabled=true; addInput.focus();
  });
  $("uncheckBtn").addEventListener("click", function(){
    state.checked = {}; write(LS.state, state); render();
  });

  // ---------- theme ----------
  var sunSvg='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>';
  var moonSvg='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></svg>';
  var themeBtn=$("themeBtn"), meta=$("themeColorMeta");
  function applyTheme(mode){
    document.documentElement.setAttribute("data-theme", mode);
    themeBtn.innerHTML = mode==="dark" ? sunSvg : moonSvg;
    meta.setAttribute("content", mode==="dark" ? "#0e1017" : "#4f46e5");
    write(LS.theme, mode);
  }
  var savedTheme = read(LS.theme, null);
  if(savedTheme!=="light" && savedTheme!=="dark"){
    savedTheme = (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) ? "dark":"light";
  }
  applyTheme(savedTheme);
  themeBtn.addEventListener("click", function(){
    applyTheme(document.documentElement.getAttribute("data-theme")==="dark" ? "light":"dark");
  });

  // ---------- date label ----------
  $("dateLabel").textContent = new Date().toLocaleDateString(undefined,{weekday:"long", month:"long", day:"numeric"});

  // ---------- toast ----------
  var toastEl=$("toast"), toastTimer;
  function showToast(msg){
    toastEl.textContent=msg; toastEl.classList.add("show");
    clearTimeout(toastTimer); toastTimer=setTimeout(function(){ toastEl.classList.remove("show"); }, 2200);
  }

  // ---------- new-day watcher (if left open past midnight) ----------
  setInterval(function(){
    if(state.date !== today()){ dailyReset(); render(); }
  }, 60*1000);

  // ---------- install prompt ----------
  var deferredPrompt=null, installBtn=$("installBtn");
  window.addEventListener("beforeinstallprompt", function(e){
    e.preventDefault(); deferredPrompt=e; installBtn.classList.add("show");
  });
  installBtn.addEventListener("click", function(){
    if(!deferredPrompt) return;
    deferredPrompt.prompt();
    deferredPrompt.userChoice.finally(function(){ deferredPrompt=null; installBtn.classList.remove("show"); });
  });
  window.addEventListener("appinstalled", function(){ installBtn.classList.remove("show"); showToast("Installed — find it on your home screen"); });
  if(window.matchMedia && window.matchMedia("(display-mode: standalone)").matches){ installBtn.classList.remove("show"); }

  // ---------- boot ----------
  dailyReset();
  render();

  // ---------- service worker ----------
  if("serviceWorker" in navigator){
    window.addEventListener("load", function(){
      navigator.serviceWorker.register("./sw.js").catch(function(){});
    });
  }
})();
</script>
</body>
</html>
